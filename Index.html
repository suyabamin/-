<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>ঈদ সালামি কার্ড</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none; /* optional: avoids accidental selection on glitter */
    }

    body {
      min-height: 100vh;
      background: radial-gradient(circle at 30% 10%, #0a1f0e, #030c05);
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Segoe UI', 'Poppins', 'Roboto', 'Noto Sans Bengali', system-ui, -apple-system, 'Times New Roman', serif;
      position: relative;
      overflow-x: hidden;
      padding: 1.5rem;
    }

    /* === 华丽的动态光晕背景 === */
    body::before {
      content: "";
      position: absolute;
      width: 150%;
      height: 150%;
      top: -25%;
      left: -25%;
      background: radial-gradient(circle, rgba(255,215,0,0.12) 0%, rgba(255,100,0,0) 70%);
      animation: slowRotate 28s infinite linear;
      pointer-events: none;
      z-index: 0;
    }

    @keyframes slowRotate {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    /* 漂浮的星星粒子 (纯CSS华丽点缀) */
    .star-particle {
      position: absolute;
      background: radial-gradient(circle, #ffdd77, #ffb347);
      width: 4px;
      height: 4px;
      border-radius: 50%;
      opacity: 0.5;
      animation: floatStar 6s infinite alternate ease-in-out;
      pointer-events: none;
      z-index: 0;
    }

    @keyframes floatStar {
      0% { transform: translateY(0px) scale(1); opacity: 0.3; }
      100% { transform: translateY(-35px) scale(1.3); opacity: 0.9; }
    }

    /* 主卡片容器 — 极尽华丽 */
    .eid-card {
      position: relative;
      z-index: 10;
      max-width: 550px;
      width: 100%;
      background: linear-gradient(135deg, #1e2a1a, #0f1a0c);
      backdrop-filter: blur(2px);
      border-radius: 68px 68px 80px 80px;
      box-shadow: 0 30px 50px rgba(0,0,0,0.6), 0 0 0 6px rgba(255, 215, 0, 0.3), 0 0 0 12px rgba(218, 165, 32, 0.2);
      transition: all 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
      overflow: hidden;
      text-align: center;
      padding: 2rem 1.8rem 2.5rem;
      border: 1px solid rgba(255, 200, 60, 0.6);
    }

    .eid-card:hover {
      transform: translateY(-8px);
      box-shadow: 0 40px 60px rgba(0,0,0,0.7), 0 0 0 8px rgba(255, 215, 0, 0.5);
      border-color: rgba(255, 220, 80, 0.9);
    }

    /* 金色花纹装饰线条 */
    .card-ornament {
      position: absolute;
      top: 20px;
      left: 20px;
      right: 20px;
      height: 3px;
      background: linear-gradient(90deg, transparent, #f5b042, #e7b52a, #f5b042, transparent);
      border-radius: 100%;
      opacity: 0.7;
    }

    .card-ornament.bottom {
      top: auto;
      bottom: 20px;
    }

    /* 新月 + 星星组合 */
    .moon-star {
      display: flex;
      justify-content: center;
      gap: 15px;
      margin-bottom: 20px;
      position: relative;
    }

    .crescent {
      width: 60px;
      height: 60px;
      background: radial-gradient(ellipse at 30% 40%, #fff7cf, #f7e05e);
      border-radius: 50%;
      box-shadow: 0 0 20px 5px rgba(255, 215, 0, 0.7);
      position: relative;
      transform: rotate(-20deg);
    }
    .crescent::before {
      content: "";
      position: absolute;
      background: #1f2a1b;
      width: 50px;
      height: 50px;
      border-radius: 50%;
      top: 5px;
      left: 12px;
      box-shadow: inset -2px -2px 5px rgba(0,0,0,0.2);
    }

    .star-gold {
      width: 0;
      height: 0;
      border-left: 20px solid transparent;
      border-right: 20px solid transparent;
      border-bottom: 35px solid #ffd966;
      position: relative;
      filter: drop-shadow(0 0 10px gold);
      animation: twinkle 1.8s infinite alternate;
    }
    .star-gold::after {
      content: "";
      position: absolute;
      width: 0;
      height: 0;
      border-left: 20px solid transparent;
      border-right: 20px solid transparent;
      border-top: 35px solid #ffd966;
      top: 12px;
      left: -20px;
    }

    @keyframes twinkle {
      0% { opacity: 0.7; transform: scale(0.95); filter: drop-shadow(0 0 2px gold);}
      100% { opacity: 1; transform: scale(1.1); filter: drop-shadow(0 0 15px #ffcc33);}
    }

    /* 标题区域 */
    .greeting {
      font-size: 2.8rem;
      font-weight: 800;
      background: linear-gradient(135deg, #FFE6A3, #F9B81B, #FFD966);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      text-shadow: 0 2px 5px rgba(0,0,0,0.3);
      letter-spacing: 2px;
      margin: 12px 0 8px;
    }

    .subtitle {
      font-size: 1.3rem;
      color: #FFE6AA;
      background: rgba(0,0,0,0.4);
      display: inline-block;
      padding: 5px 18px;
      border-radius: 60px;
      backdrop-filter: blur(4px);
      font-weight: 500;
      margin-bottom: 20px;
      border: 1px solid rgba(255,215,0,0.4);
    }

    /* 精美装饰分隔线 */
    .divider {
      width: 70%;
      height: 2px;
      background: linear-gradient(90deg, transparent, #F3B33D, #F9E0A0, #F3B33D, transparent);
      margin: 16px auto;
    }

    /* 萨拉米信息卡片正文 */
    .salami-message {
      background: rgba(0,0,0,0.3);
      border-radius: 50px;
      padding: 15px 20px;
      margin: 15px 0;
      backdrop-filter: blur(3px);
      border: 1px solid rgba(255, 200, 80, 0.4);
    }

    .salami-message p {
      color: #f9eec1;
      font-size: 1rem;
      line-height: 1.5;
      font-weight: 500;
      text-shadow: 0 1px 1px black;
    }

    .salami-message i {
      color: #ffcf4a;
      font-style: normal;
      font-weight: bold;
    }

    /* 华丽的按钮 */
    .salami-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      background: linear-gradient(115deg, #b67e1f, #e7b422, #ffcd6b);
      border: none;
      padding: 16px 28px;
      font-size: 1.15rem;
      font-weight: bold;
      font-family: inherit;
      color: #1f2a0e;
      border-radius: 60px;
      cursor: pointer;
      box-shadow: 0 12px 20px rgba(0,0,0,0.3), 0 0 0 2px rgba(255,220,80,0.5), inset 0 1px 0 rgba(255,255,200,0.7);
      transition: all 0.25s ease;
      margin-top: 20px;
      margin-bottom: 12px;
      width: 100%;
      text-shadow: 0 1px 0 rgba(255,255,200,0.8);
      letter-spacing: 0.5px;
      backdrop-filter: blur(2px);
    }

    .salami-btn span {
      font-size: 1.4rem;
    }

    .salami-btn:hover {
      transform: scale(1.02);
      background: linear-gradient(115deg, #cf931f, #ffcd4a, #ffdf8c);
      box-shadow: 0 18px 28px rgba(0,0,0,0.4), 0 0 0 4px rgba(255,220,100,0.7);
      color: #1f2a03;
    }

    .salami-btn:active {
      transform: scale(0.98);
      transition: 0.05s;
    }

    /* 底部祝福 */
    .footer-bless {
      margin-top: 25px;
      font-size: 0.85rem;
      color: #e4c87b;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      border-top: 1px dashed rgba(255,215,0,0.4);
      padding-top: 15px;
    }

    .footer-bless span {
      font-size: 1rem;
    }

    /* 浮动小光晕 */
    .glow-spot {
      position: absolute;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,180,40,0.4), transparent 70%);
      width: 150px;
      height: 150px;
      top: -50px;
      right: -40px;
      z-index: 1;
      pointer-events: none;
      filter: blur(25px);
      animation: pulseGlow 5s infinite alternate;
    }

    .glow-spot2 {
      left: -60px;
      bottom: -40px;
      top: auto;
      background: radial-gradient(circle, rgba(255,100,30,0.35), transparent 70%);
      animation: pulseGlow 6s infinite alternate-reverse;
    }

    @keyframes pulseGlow {
      0% { opacity: 0.3; transform: scale(0.8);}
      100% { opacity: 0.8; transform: scale(1.3);}
    }

    /* 响应式调整 */
    @media (max-width: 550px) {
      .eid-card {
        padding: 1.5rem 1.2rem 2rem;
      }
      .greeting {
        font-size: 2rem;
      }
      .subtitle {
        font-size: 1rem;
      }
      .salami-btn {
        font-size: 0.9rem;
        padding: 14px 12px;
        gap: 8px;
      }
      .salami-btn span {
        font-size: 1.2rem;
      }
      .crescent {
        width: 50px;
        height: 50px;
      }
      .crescent::before {
        width: 42px;
        height: 42px;
        left: 10px;
      }
      .star-gold {
        border-left: 16px solid transparent;
        border-right: 16px solid transparent;
        border-bottom: 28px solid #ffd966;
      }
      .star-gold::after {
        border-left: 16px solid transparent;
        border-right: 16px solid transparent;
        border-top: 28px solid #ffd966;
        top: 9px;
        left: -16px;
      }
    }

    /* 装饰性闪烁星星线条 */
    .sparkle {
      position: absolute;
      width: 100%;
      height: 100%;
      top: 0;
      left: 0;
      pointer-events: none;
      z-index: 2;
      overflow: hidden;
      border-radius: inherit;
    }
    .sparkle i {
      position: absolute;
      background: gold;
      width: 3px;
      height: 3px;
      border-radius: 50%;
      opacity: 0;
      animation: sparkFade 3s infinite;
    }

    @keyframes sparkFade {
      0% { opacity: 0; transform: scale(0);}
      50% { opacity: 0.9; transform: scale(1);}
      100% { opacity: 0; transform: scale(0);}
    }

    /* 额外的阿拉伯风格纹路 (伪类) */
    .eid-card::after {
      content: "✨ ۞ ✨";
      position: absolute;
      bottom: 10px;
      right: 20px;
      font-size: 18px;
      opacity: 0.3;
      color: #ffd966;
      font-family: monospace;
      pointer-events: none;
      transform: rotate(-5deg);
    }

    .eid-card::before {
      content: "۞ ۞ ۞";
      position: absolute;
      top: 15px;
      left: 20px;
      font-size: 18px;
      opacity: 0.3;
      color: #ffcf4a;
      letter-spacing: 4px;
      pointer-events: none;
    }
  </style>
</head>
<body>

<!-- 动态漂浮粒子背景 -->
<div id="particles-container"></div>

<!-- 华丽主卡片 -->
<div class="eid-card">
  <div class="card-ornament"></div>
  <div class="card-ornament bottom"></div>
  <div class="glow-spot"></div>
  <div class="glow-spot glow-spot2"></div>
  
  <!-- 月亮星星装饰区 -->
  <div class="moon-star">
    <div class="crescent"></div>
    <div class="star-gold"></div>
  </div>
  
  <!-- 标题祝福 -->
  <div class="greeting">
    ঈদ মোবারক
  </div>
  <div class="subtitle">
    ✦ ঈদ-উল-ফিতর ✦
  </div>
  
  <div class="divider"></div>
  
  <!-- 萨拉米收集信息卡 -->
  <div class="salami-message">
    <p>🌙 আসসালামু আলাইকুম 🌙<br>
    আপনার জন্য রইলো সোনালী ঈদের শুভেচ্ছা। <i>সালামি</i> ও <i>দোয়া</i> নিয়ে এসেছে ঈদের আনন্দ।<br>
    🎁 সোয়েব আমিন চান্দা ভাই,এর পক্ষ থেকে ঈদের বিশেষ উপহার 🎁</p>
  </div>
  
  <!-- 关键按钮: 收集萨拉米的钱, 点击跳转Youtube链接 -->
  <button class="salami-btn" id="collectSalamiBtn">
    <span>💰</span> সালামির টাকা সংগ্রহ করতে এই বাটনে ক্লিক করুন <span>🎁</span>
  </button>
  
  <div class="footer-bless">
    <span>⭐</span> ঈদের খুশি দ্বিগুণ হোক <span>⭐</span>
  </div>
  <div class="sparkle" id="sparkleOverlay"></div>
</div>

<script>
  // 1. 实现按钮跳转链接 (新标签页打开 YouTube)
  const btn = document.getElementById('collectSalamiBtn');
  const targetUrl = "https://youtu.be/6PjRmTFVhkQ?si=_dW_NWIOq9nCS0re";
  
  if (btn) {
    btn.addEventListener('click', (e) => {
      e.preventDefault();
      // 添加微妙的点击反馈（涟漪效果）
      btn.style.transform = "scale(0.97)";
      setTimeout(() => {
        btn.style.transform = "";
      }, 120);
      
      // 华丽跳转: 新窗口打开目标链接
      window.open(targetUrl, '_blank', 'noopener,noreferrer');
      
      // 可选: 控制台日志仅供调试
      console.log("ঈদ সালামি কার্ড: ইউটিউব লিংকে রিডাইরেক্ট করা হচ্ছে 💖");
    });
  }
  
  // 2. 创造动态闪烁星星粒子（让卡片更加华丽 + 动态感）
  function createStars() {
    const container = document.getElementById('particles-container');
    if (!container) return;
    const starCount = 70;
    for (let i = 0; i < starCount; i++) {
      const star = document.createElement('div');
      star.classList.add('star-particle');
      const size = Math.random() * 5 + 2;
      star.style.width = `${size}px`;
      star.style.height = `${size}px`;
      star.style.left = `${Math.random() * 100}%`;
      star.style.top = `${Math.random() * 100}%`;
      star.style.animationDelay = `${Math.random() * 8}s`;
      star.style.animationDuration = `${Math.random() * 6 + 3}s`;
      star.style.opacity = Math.random() * 0.6 + 0.2;
      star.style.background = `radial-gradient(circle, #ffdd99, #f5b025)`;
      container.appendChild(star);
    }
  }
  
  // 3. 额外增加卡片周围闪闪发光的微光点 (点缀)
  function addExtraSparkles() {
    const sparkleDiv = document.getElementById('sparkleOverlay');
    if (!sparkleDiv) return;
    for (let i = 0; i < 45; i++) {
      const dot = document.createElement('i');
      const leftPos = Math.random() * 100;
      const topPos = Math.random() * 100;
      dot.style.left = `${leftPos}%`;
      dot.style.top = `${topPos}%`;
      dot.style.width = `${Math.random() * 4 + 1}px`;
      dot.style.height = dot.style.width;
      dot.style.animationDelay = `${Math.random() * 4}s`;
      dot.style.animationDuration = `${Math.random() * 2 + 1.5}s`;
      dot.style.background = `rgba(255, 215, ${Math.random() * 80 + 100}, 0.9)`;
      sparkleDiv.appendChild(dot);
    }
  }
  
  // 4. 制作月亮星光的轻柔脉冲阴影让卡片更生动 (纯JS动画辅助 - 额外修饰)
  function addDynamicGlow() {
    const card = document.querySelector('.eid-card');
    if (!card) return;
    let glowActive = false;
    setInterval(() => {
      // 轻微改变边框光晕，华丽呼吸效果
      if (!glowActive) {
        card.style.boxShadow = "0 30px 50px rgba(0,0,0,0.6), 0 0 0 6px rgba(255, 200, 70, 0.6), 0 0 0 12px rgba(218, 165, 32, 0.3)";
        glowActive = true;
      } else {
        card.style.boxShadow = "0 32px 55px rgba(0,0,0,0.65), 0 0 0 8px rgba(255, 220, 90, 0.7), 0 0 0 14px rgba(255, 200, 60, 0.3)";
        glowActive = false;
      }
    }, 1800);
  }
  
  // 增加按钮闪烁提示：在页面加载后让按钮微光轻轻吸引点击
  function btnAttractGlow() {
    const btnEl = document.getElementById('collectSalamiBtn');
    if (!btnEl) return;
    let count = 0;
    const interval = setInterval(() => {
      if (count >= 4) {
        clearInterval(interval);
        btnEl.style.transition = "box-shadow 0.2s";
        btnEl.style.boxShadow = "0 12px 20px rgba(0,0,0,0.3), 0 0 0 2px rgba(255,220,80,0.5), inset 0 1px 0 rgba(255,255,200,0.7)";
        return;
      }
      btnEl.style.boxShadow = "0 0 0 4px #ffd966, 0 0 0 10px rgba(255, 200, 0, 0.4), 0 12px 25px black";
      setTimeout(() => {
        if (btnEl) btnEl.style.boxShadow = "0 12px 20px rgba(0,0,0,0.3), 0 0 0 2px rgba(255,220,80,0.5), inset 0 1px 0 rgba(255,255,200,0.7)";
      }, 400);
      count++;
    }, 800);
  }
  
  // 初始化所有华丽特效和交互
  window.addEventListener('DOMContentLoaded', () => {
    createStars();
    addExtraSparkles();
    addDynamicGlow();
    btnAttractGlow();
    
    // 加入随机的光晕闪烁，增加生机
    const cardBody = document.querySelector('.eid-card');
    if (cardBody) {
      setInterval(() => {
        const randomGlow = document.createElement('div');
        randomGlow.style.position = 'absolute';
        randomGlow.style.width = '80px';
        randomGlow.style.height = '80px';
        randomGlow.style.borderRadius = '50%';
        randomGlow.style.background = 'radial-gradient(circle, rgba(255,200,100,0.4), transparent)';
        randomGlow.style.top = Math.random() * 100 + '%';
        randomGlow.style.left = Math.random() * 100 + '%';
        randomGlow.style.pointerEvents = 'none';
        randomGlow.style.zIndex = '0';
        randomGlow.style.opacity = '0.6';
        randomGlow.style.filter = 'blur(12px)';
        randomGlow.style.animation = 'pulseGlow 1s ease-out forwards';
        cardBody.appendChild(randomGlow);
        setTimeout(() => {
          randomGlow.remove();
        }, 1000);
      }, 4000);
    }
    
    // 额外的鼠标跟随效果: 在卡片上轻微移动光晕，增加豪华感 (可选)
    const card = document.querySelector('.eid-card');
    card?.addEventListener('mousemove', (e) => {
      const rect = card.getBoundingClientRect();
      const x = ((e.clientX - rect.left) / rect.width) * 100;
      const y = ((e.clientY - rect.top) / rect.height) * 100;
      const glowSpot = card.querySelector('.glow-spot');
      if (glowSpot) {
        glowSpot.style.transform = `translate(${x * 0.05}px, ${y * 0.05}px)`;
      }
      const glowSpot2 = card.querySelector('.glow-spot2');
      if (glowSpot2) {
        glowSpot2.style.transform = `translate(${x * -0.03}px, ${y * -0.03}px)`;
      }
    });
  });
</script>
</body>
</html>
